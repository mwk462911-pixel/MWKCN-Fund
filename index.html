<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWKCN Class Fund Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #maintenance-screen, #main-dashboard { display: none; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .highlight { color: #ff4757; font-weight: 800; }
    </style>
</head>
<body>

    <!-- หน้า Loading -->
    <div id="loading-screen" class="loading-screen">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3">กำลังตรวจสอบสถานะระบบ...</p>
    </div>

    <!-- หน้าปิดปรับปรุง (Maintenance) -->
    <div id="maintenance-screen" class="container text-center py-5">
        <div class="video-icon-wrapper">
            <svg class="hourglass-svg" viewBox="0 0 80 80">
                <path class="hourglass-frame" d="M25,15 L55,15 L55,20 C55,32 46,38 41,40 C46,42 55,48 55,60 L55,65 L25,65 L25,60 C25,48 34,42 39,40 C34,38 25,32 25,20 Z" />
                <path class="hourglass-sand-top" d="M27,20 L53,20 C53,30 46,36 40,39 C34,36 27,30 27,20 Z" />
                <path class="hourglass-sand-bottom" d="M27,60 L53,60 C53,62 53,64 53,64 L27,64 C27,64 27,62 27,60 Z" />
                <line class="hourglass-line" x1="40" y1="39" x2="40" y2="61" />
            </svg>
        </div>
        <h1 class="mt-4">ระบบปิดปรับปรุงชั่วคราวประจำสัปดาห์</h1>
        <p id="maintenance-desc"></p>
        <p>และจะกลับมาเปิดใช้งานอีกครั้งใน <span class="highlight" id="return-time"></span></p>
    </div>

    <!-- หน้า Dashboard หลัก -->
    <div id="main-dashboard">
        <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
            <div class="container">
                <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-wallet me-2"></i>MWKCN Class Fund</span>
                <div id="countdownBox" class="badge bg-light text-primary p-2"></div>
            </div>
        </nav>

        <div class="container">
            <div class="row mb-4 g-2">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-list"></i></span>
                        <select id="sheetSelect" class="form-select" onchange="refreshData()">
                            <option value="">เลือกข้อมูลรายเดือน...</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="searchId" class="form-control" placeholder="ค้นหาชื่อหรือเลขที่..." onkeyup="applySearch()">
                    </div>
                </div>
            </div>

            <div id="loader" class="text-center my-5" style="display:none;">
                <div class="spinner-border text-primary mb-2"></div>
                <p id="loader-text" class="text-muted">กำลังดึงข้อมูลจาก Google Sheets...</p>
            </div>

            <div id="data-container" class="row g-3">
                <!-- ข้อมูลนักเรียนจะถูกแสดงที่นี่ด้วย JavaScript -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- ลำดับการโหลดสคริปต์สำคัญมาก -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
