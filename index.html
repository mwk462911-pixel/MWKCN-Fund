
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>MWKCN Class Fund Dashboard - GitHub Pages</title>
    
    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Intro Overlay -->
    <div id="intro-overlay">
        <div class="intro-title">MWKCN</div>
        <div class="intro-subtitle">CLASS FUND SYSTEM v2.0</div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" style="position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; color: white;">
        <div class="spinner-border text-primary"></div>
    </div>

    <!-- Maintenance Screen -->
    <div id="maintenance-screen">
        <div class="video-icon-wrapper">
            <i class="fa-solid fa-hourglass-half fa-4x mb-4"></i>
        </div>
        <h1>ระบบปิดปรับปรุง</h1>
        <p>ขณะนี้เป็น <span class="highlight">ช่วงวันหยุดสุดสัปดาห์</span> (เสาร์-อาทิตย์)<br>ระบบปิดรับยอดชั่วคราวเพื่อสรุปบัญชีประจำสัปดาห์ครับ</p>
        <p class="mt-3 small text-muted">จะกลับมาเปิดให้บริการอีกครั้งในวันจันทร์ เวลา 00:00 น.</p>
    </div>

    <!-- Main Dashboard -->
    <div id="main-dashboard" style="display: none;">
        <header class="app-header">
            <h1>MWKCN FUND</h1>
            <p>ระบบติดตามยอดเงินห้องเรียน 6/11</p>
        </header>

        <div class="overview-card">
            <h5>📊 สรุปภาพรวม</h5>
            <div id="countdownBox" class="overview-badge">กำลังโหลดเวลาคงเหลือ...</div>
        </div>

        <section class="search-section">
            <div class="row g-2">
                <div class="col-8">
                    <input type="text" id="searchId" class="form-control" placeholder="ค้นหาชื่อหรือเลขที่..." oninput="applySearch()">
                </div>
                <div class="col-4">
                    <select id="sheetSelect" class="form-select" onchange="refreshData()"></select>
                </div>
            </div>
        </section>

        <div id="data-container" class="container">
            <!-- Student Cards will be rendered here -->
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" style="display: none;">
        <div class="spinner-border text-primary"></div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
